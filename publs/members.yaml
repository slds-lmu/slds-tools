# SLDS members and the IDs we use to find them on external publication sources.
#
# Seeded from https://www.slds.stat.uni-muenchen.de/people/ on 2026-05-04.
#
# Resolution order (most reliable first):
#   1. openalex_id  -> e.g. "A5012345678" (the trailing token of the OpenAlex
#                      author URL https://openalex.org/A5012345678).
#   2. orcid        -> "0000-0000-0000-0000". OpenAlex maps ORCIDs to author
#                      IDs internally; if you know the ORCID, that's enough.
#   3. name search  -> last resort. The tool will warn and let you confirm.
#
# scholar_id is kept for the future Google Scholar integration (added last
# because Scholar blocks easily). Members with no IDs at all fall back to
# name search.
#
# Optional fields:
#   include: false   -> skip this member entirely (alumni, admins)
#   role: free text  -> bookkeeping; not used by code

