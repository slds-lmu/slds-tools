# You MUST fill in `scholar_id` for each member you want included. Members with
# `scholar_id: null` are skipped (with a warning) by `publs fetch`.
#
# How to find a Scholar ID:
#   1. Open the person's Google Scholar profile.
#   2. The URL looks like https://scholar.google.com/citations?user=ABCDEF1234&hl=en
#   3. The value of `user=` is the scholar_id.
#
# Optional fields:
#   include: false   -> skip this member entirely (e.g., admins, alumni)
#   role: free text  -> just for your bookkeeping; not used by the scraper

