# Seeded from https://www.slds.stat.uni-muenchen.de/people/ on 2026-05-04.
#
# Per-source ID mapping:
#   openalex_id  -> OpenAlex   (e.g. A5012345678; from https://openalex.org/A5012345678)
#   orcid        -> Crossref   (e.g. 0000-0000-0000-0000)
#   scholar_id   -> Google Scholar (the `user=` param of the profile URL)
#
# All three are OPTIONAL. A null ID means: that source is silently
# skipped for this member; the tool does NOT fall back to a name
# search. publs prints a LOUD end-of-run warning summarising every
# missing ID so coverage gaps stay visible.
#
# include: false  -> skip this member entirely (alumni, admins)
# role: free text -> bookkeeping; not used by code

