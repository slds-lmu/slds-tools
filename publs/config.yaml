# Global configuration for publs.

# The single SSOT BibTeX file. 
ssot_path: slds.bib

# Year cutoff applied at FETCH time, before matching. Any candidate whose
# `publication_year < min_year` (or whose year is missing entirely) is
# discarded before it can be surfaced as "missing" or "outdated".
min_year: 2015

# Contact email for the OpenAlex "polite pool" (passed as ?mailto= and in the
# User-Agent). OpenAlex uses this to contact you if your scripts misbehave;
# the polite pool also gets faster, more stable rate limits.
mailto: bernd_bischl@gmx.net
